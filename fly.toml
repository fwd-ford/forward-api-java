app = "forward-api-java"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  ENV = "production"
  LOG_LEVEL = "INFO"
  ALLOWED_ORIGINS = "https://expo.dev,https://expo.io,http://localhost:8081,http://127.0.0.1:8081"
  RATE_LIMIT_MAX = "60"
  RATE_LIMIT_WINDOW = "1m"
  MAX_BODY_BYTES = "1048576"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
